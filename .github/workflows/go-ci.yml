name: Go CI

on:
  push:
    branches:
      - main
      - workshop-prototype
      - tareq-auth-tests
      - yanik-http
  pull_request:
    branches:
      - main
      - workshop-prototype

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...
