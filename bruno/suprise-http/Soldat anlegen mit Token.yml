info:
  name: Soldat anlegen mit Token
  type: http
  seq: 8

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "vorname": "Mikasa",
        "nachname": "Ackermann",
        "geburtsdatum": "2000-02-10",
        "geschlecht": "WEIBLICH",
        "rang": "ELITE-SOLDAT",
        "username": "{{soldatUsername}}",
        "ausruestung": {
          "waffe": "Klinge",
          "seriennummer": "{{soldatSeriennummer}}"
        }
      }
  auth:
    type: bearer
    token: "{{bearerToken}}"

runtime:
  scripts:
    - type: pre-request
      code: |-
        const suffix = Date.now().toString();
        bru.setVar('soldatUsername', 'mikasa-' + suffix);
        bru.setVar('soldatSeriennummer', 'AOT-' + suffix);
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json
    - expression: res.body.id
      operator: isDefined
    - expression: res.body.username
      operator: matches
      value: ^mikasa-

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
