info:
  name: Soldaten auflisten
  type: http
  seq: 2

http:
  method: GET
  url: "{{restUrl}}"
  headers:
    - name: Accept
      value: application/json
  auth: none

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
