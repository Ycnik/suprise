info:
  name: Health
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/health"
  headers:
    - name: Accept
      value: application/json
  auth: none

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json
    - expression: res.body.status
      operator: eq
      value: ok

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
