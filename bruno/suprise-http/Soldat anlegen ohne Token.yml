info:
  name: Soldat anlegen ohne Token
  type: http
  seq: 7

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "vorname": "Eren",
        "nachname": "Jaeger",
        "geburtsdatum": "2000-01-01",
        "geschlecht": "MAENNLICH",
        "rang": "SOLDAT",
        "username": "eren",
        "ausruestung": {
          "waffe": "ODM_GEAR",
          "seriennummer": "AOT-12345ABC"
        }
      }
  auth: none

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
