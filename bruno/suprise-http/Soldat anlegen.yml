info:
  name: Soldat anlegen
  type: http
  seq: 4

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "vorname": "Eren",
        "nachname": "Jaeger",
        "geburtsdatum": "2000-01-01",
        "geschlecht": "MAENNLICH",
        "rang": "SOLDAT",
        "username": "{{soldatUsername}}",
        "ausruestung": {
          "waffe": "ODM_GEAR",
          "seriennummer": "{{soldatSeriennummer}}"
        }
      }
  auth: none

runtime:
  scripts:
    - type: pre-request
      code: |-
        const suffix = Date.now().toString();
        bru.setVar('soldatUsername', 'eren-' + suffix);
        bru.setVar('soldatSeriennummer', 'AOT-' + suffix);
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json
    - expression: res.body.id
      operator: isDefined
    - expression: res.body.username
      operator: matches
      value: ^eren-
    - expression: res.body.ausruestung.waffe
      operator: eq
      value: ODM_GEAR

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
