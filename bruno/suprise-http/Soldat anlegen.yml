info:
  name: Soldat anlegen
  type: http
  seq: 4

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: application/json
  body:
    type: json
    data: |-
      {
        "vorname": "Jean",
        "nachname": "Kirstein",
        "geburtsdatum": "2000-04-07",
        "geschlecht": "MAENNLICH",
        "rang": "SOLDAT",
        "username": "jean-test-006",
        "ausruestung": {
          "waffe": "Klinge",
          "seriennummer": "AOT-TEST-006"
        }
      }
  auth:
    type: bearer
    token: "{{bearerToken}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json
    - expression: res.body.id
      operator: isDefined
    - expression: res.body.username
      operator: eq
      value: jean-test-006
    - expression: res.body.ausruestung.waffe
      operator: eq
      value: Klinge

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
