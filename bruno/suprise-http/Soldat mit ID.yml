info:
  name: Soldat mit ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: "{{soldatId}}"
      type: path
  auth: none

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json
    - expression: res.headers.etag
      operator: isDefined
    - expression: res.body.id
      operator: eq
      value: "{{soldatId}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
