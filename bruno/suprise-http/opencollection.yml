opencollection: 1.0.0

info:
  name: suprise-http

request:
  variables:
    - name: baseUrl
      value: http://localhost:8080
    - name: restUrl
      value: "{{baseUrl}}/rest"
    - name: soldatId
      value: "1"
    - name: keycloakBaseUrl
      value: http://localhost:8880
    - name: realm
      value: suprise
    - name: oidcIssuerUrl
      value: "{{keycloakBaseUrl}}/realms/{{realm}}"
    - name: oidcTokenUrl
      value: "{{oidcIssuerUrl}}/protocol/openid-connect/token"
    - name: clientId
      value: suprise-client
    - name: clientSecret
      value: ""
    - name: username
      value: admin
    - name: password
      value: p
    - name: bearerToken
      value: ""

bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
